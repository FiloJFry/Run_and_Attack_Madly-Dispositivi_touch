<!doctype HTML>
<html lang = "it">
    <head>
        <meta charset = "UTF-8"/>
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>Run and Attack Madly</title>
        <link rel = "stylesheet" href = "./Aspetto.css">
        <link rel="stylesheet" href="Animazioni.css">
        <style id = "filtroColore"></style>
        <script>
            if(window.localStorage.getItem('Filtro') != null){document.querySelector('#filtroColore').innerHTML = `*{filter: grayscale(${100/window.localStorage.getItem("Filtro")}%); -webkit-filter: grayscale(${100/window.localStorage.getItem("Filtro")}%);}`;}
            document.addEventListener('click', function(event){window.location.href = "./SchermataOpzioni.html";});
        </script>
    </head>
    <body style = "background: black">
        <header>
            <h1 class = "BlipBlip" translate = "no">Run and Attack Madly</h1>
            <h2 class = "BlipBlip" style = "font-style: italic">Lasciate ogni speranza voi che loggate</h2>
        </header>
        <h6 class = "BlipBlip" style = "animation-iteration-count: infinite">Clicca un punto qualsiasi per continuare</h6>
    </body>
</html>
